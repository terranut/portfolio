{% extends "portfolio/inicio.html" %}



 {%block contacto%}
 <style>
* {
    box-sizing: border-box;
}

input[type=text], select, textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
    resize: vertical;
}


input[type=email], select, textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
    resize: vertical;
}


label {
    padding: 12px 12px 12px 0;
    display: inline-block;
}

input[type=submit] {
    background-color: #4CAF50;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    float: right;
}

input[type=submit]:hover {
    background-color: #45a049;
}

.container {
    border-radius: 5px;
    background-color: #f2f2f2;
    padding: 20px;
}

.col-25 {
    float: left;
    width: 25%;
    margin-top: 6px;
}

.col-75 {
    float: left;
    width: 75%;
    margin-top: 6px;
}

/* Clear floats after the columns */
.row:after {
    content: "";
    display: table;
    clear: both;
}

/* Responsive layout - when the screen is less than 600px wide, make the two columns stack on top of each other instead of next to each other */
@media screen and (max-width: 600px) {
    .col-25, .col-75, input[type=submit] {
        width: 100%;
        margin-top: 0;
    }
}
</style>
         

<div class="w3-container w3-card w3-white w3-margin-bottom">        


<h2 class="w3-text-grey w3-padding-16">

	<a href="/" ><i class="fa fa-arrow-left fa-fw w3-margin-right w3-xxlarge w3-text-teal"></i></a>





Contacto</h2>








<div>
 

  <form action="/contacto/" method="post" >{% csrf_token %}
    <div class="row">
      <div class="col-25">
        <label for="fname">Nombre</label>
      </div>
      <div class="col-75">
        {{form.nombre}}
      </div>
    </div>
    <div class="row">
      <div class="col-25">
        <label for="lname">E-mail</label>
      </div>
      <div class="col-75">
        {{form.email}}
      </div>
    </div>
    <div class="row">
      <div class="col-25">
        <label for="Asunto">Asunto</label>
      </div>

         <div class="col-75">
       {{form.asunto}}
      </div>
    </div>
    <div class="row">
      <div class="col-25">
        <label for="subject">Mensaje</label>
      </div>
      <div class="col-75">
        {{form.mensaje}}
      </div>
    </div>
    <br>
    <div class="row">
      <input type="submit" value="Submit" style="background-color: #009688">
    </div>
  </form>

</div>

<br>



</div>
 {%endblock%}
